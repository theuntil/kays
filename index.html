<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KAYS — Kayseri KAYS geliyor</title>
<link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Podcasts_%28iOS%29.svg/500px-Podcasts_%28iOS%29.svg.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,system-ui;
background:#000;
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* BG */
.bg{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
opacity:.18;
}

/* CONTAINER */
.container{
position:relative;
z-index:2;
text-align:center;
max-width:760px;
padding:30px 20px;
}

/* LOGO */
.logo{
height:80px;
margin-bottom:18px;
}

/* TITLE */
h1{
font-size:48px;
font-weight:700;
margin-bottom:10px;
}

/* SUBTITLE */
.subtitle{
opacity:.65;
font-size:16px;
margin-bottom:28px;
line-height:1.5;
}

/* FEATURES (ULTRA MINIMAL) */
.features{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
margin-bottom:35px;
}

.feature{
display:flex;
align-items:center;
gap:8px;
padding:10px 14px;
border-radius:999px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.08);
font-size:13px;
opacity:.8;
transition:.2s;
}

.feature:hover{
background:rgba(255,255,255,0.08);
}

.feature img{
height:16px;
}

/* COUNTDOWN (LIGHT) */
.countdown{
display:flex;
justify-content:center;
gap:16px;
margin-bottom:40px;
}

.time{
text-align:center;
}

.number{
font-size:28px;
font-weight:600;
}

.label{
font-size:11px;
opacity:.5;
}

/* STORES */
.stores{
display:flex;
gap:12px;
justify-content:center;
margin-bottom:25px;
}

.store{
display:flex;
align-items:center;
gap:8px;
padding:10px 16px;
border-radius:999px;
background:rgba(255,255,255,0.9);
color:#000;
font-size:13px;
text-decoration:none;
transition:.2s;
}

.store:hover{
transform:scale(1.05);
}

.store img{
height:16px;
}

/* CONTACT */
.contact{
font-size:12px;
opacity:.4;
}

/* MOBILE */
@media (max-width:600px){

h1{ font-size:32px; }

.subtitle{ font-size:14px; }

.number{ font-size:22px; }

}

</style>
</head>

<body>

<img src="image.svg" class="bg">

<div class="container">

<img src="kays.png" class="logo">



<p class="subtitle">
Kayseri'nin Super App'i KAYS, 20 Mayıs'ta sizlerle buluşuyor. Tüm ihtiyaçlarınız tek bir uygulamada, çok yakında.
</p>

<!-- FEATURES -->
<div class="features">

<div class="feature">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a3/Uk_tram_icon_white.png">
Ulaşım
</div>

<div class="feature">
<img src="https://static.vecteezy.com/system/resources/thumbnails/070/915/066/small/white-3d-plus-sign-isolated-on-transparent-background-png.png">
İlanlar
</div>

<div class="feature">
<img src="https://i.pinimg.com/564x/2c/86/5c/2c865c778ee0060da6a72272fde16c69.jpg">
İndirimler
</div>

<div class="feature">
<img src="https://img.icons8.com/ios_filled/512w/FFFFFF/confetti.png">
Etkinlikler
</div>

<div class="feature">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSowqElQMR6oekwq4k2UOVk6Ig_TkmMhyLmhQ&s">
Sosyal Medya
</div>

<div class="feature">
<img src="https://img.icons8.com/fluent-systems-filled/512/FFFFFF/news.png">
Haberler
</div>

</div>

<!-- COUNTDOWN -->
<div class="countdown">

<div class="time">
<div class="number" id="days">0</div>
<div class="label">Gün</div>
</div>

<div class="time">
<div class="number" id="hours">0</div>
<div class="label">Saat</div>
</div>

<div class="time">
<div class="number" id="minutes">0</div>
<div class="label">Dakika</div>
</div>

<div class="time">
<div class="number" id="seconds">0</div>
<div class="label">Saniye</div>
</div>

</div>

<!-- STORES -->
<div class="stores">

<a class="store" href="https://apps.apple.com/us/developer/rovand-ltd/id1877911901">
<img src="https://cdn-icons-png.flaticon.com/512/0/747.png">
App Store
</a>

<a class="store" href="https://play.google.com/store/apps/dev?id=7529641658741841420">
<img src="https://cdn-icons-png.flaticon.com/512/888/888857.png">
Google Play
</a>

</div>

<!-- CONTACT -->
<div class="contact">
contact@rovand.limited
</div>

</div>

<script>

const launch = new Date("2026-05-20T00:00:00").getTime()

setInterval(()=>{

const now = new Date().getTime()
const distance = launch - now

if(distance < 0){
document.getElementById("days").innerText = 0
document.getElementById("hours").innerText = 0
document.getElementById("minutes").innerText = 0
document.getElementById("seconds").innerText = 0
return
}

const days = Math.floor(distance / (1000*60*60*24))
const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60))
const minutes = Math.floor((distance % (1000*60*60)) / (1000*60))
const seconds = Math.floor((distance % (1000*60)) / 1000)

document.getElementById("days").innerText = days
document.getElementById("hours").innerText = hours
document.getElementById("minutes").innerText = minutes
document.getElementById("seconds").innerText = seconds

},1000)

</script>

</body>
</html>
